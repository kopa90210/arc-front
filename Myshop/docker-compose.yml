version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: myshop_db
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - myshop_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # .NET Backend API
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: myshop_api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5000
      MYSHOP_DB_CONNECTION: "Host=postgres;Port=5432;Database=postgres;Username=${DB_USER:-postgres};Password=${DB_PASSWORD:-postgres};Trust Server Certificate=true"
      MYSHOP_JWT_KEY: ${JWT_KEY:-ThisIsASuperStrongSecretKey_For_JWT_Auth_2025!!}
      MYSHOP_JWT_ISSUER: Myshop.Api
      MYSHOP_JWT_AUDIENCE: Myshop.Client
      MYSHOP_ALLOWED_ORIGINS: "http://localhost:5173,http://localhost:3000"
      MYSHOP_SENDGRID_APIKEY: ${SENDGRID_APIKEY:-}
      MYSHOP_SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      MYSHOP_SMTP_PORT: ${SMTP_PORT:-587}
      MYSHOP_SMTP_USER: ${SMTP_USER:-}
      MYSHOP_SMTP_PASS: ${SMTP_PASS:-}
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - myshop_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  # React Frontend (optional, for local development)
  client:
    build:
      context: ./client
      dockerfile: Dockerfile.dev
    container_name: myshop_client
    environment:
      VITE_API_URL: http://localhost:5000/api
      VITE_API_HOST: http://localhost:5000
    ports:
      - "5173:5173"
    depends_on:
      - api
    networks:
      - myshop_network
    volumes:
      - ./client/src:/app/src
      - ./client/public:/app/public

volumes:
  postgres_data:

networks:
  myshop_network:
    driver: bridge
