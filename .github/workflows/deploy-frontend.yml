name: Deploy Frontend to Vercel

on:
  push:
    branches:
      - main
      - deploy
    paths:
      - 'client/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './client/package-lock.json'

      - name: Install dependencies
        run: |
          cd client
          npm ci

      - name: Validate production API URL
        shell: bash
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: |
          if [[ -z "$VITE_API_URL" ]]; then
            echo "VITE_API_URL is empty. Set it to your backend URL, e.g. https://<service>.up.railway.app/api"
            exit 1
          fi
          if [[ "$VITE_API_URL" == "https://api.railway.app"* ]]; then
            echo "VITE_API_URL points to Railway platform API. Use your service URL instead."
            exit 1
          fi
          if [[ "$VITE_API_URL" == *".railway.internal"* ]]; then
            echo "VITE_API_URL uses a private Railway internal domain. Browsers cannot reach it."
            exit 1
          fi

      - name: Build
        run: |
          cd client
          npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_API_HOST: ${{ secrets.VITE_API_HOST }}

      - name: Deploy to Vercel
        uses: vercel/action@main
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: client
          production: true

      - name: Comment PR with Vercel URL
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Frontend deployed to Vercel! Visit https://myshop.vercel.app'
            })
